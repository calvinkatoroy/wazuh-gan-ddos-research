<!-- Wazuh Manager ossec.conf — Active Response and GANDD-Bridge log monitoring
     This is a SNIPPET showing only the GANDD-specific additions.
     Merge into the full /var/ossec/etc/ossec.conf on VM3.
     Blue Team component — Calvin Wirathama Katoroy (2306242395)

     Full ossec.conf reference: https://documentation.wazuh.com/current/user-manual/reference/ossec-conf/index.html
-->

<!-- ══════════════════════════════════════════════════════════════════════════
     1. Active Response — triggered by Rule 100200 (GANDD_ALERT)
        Blocks attacking source IP via iptables for 60 seconds.
     ══════════════════════════════════════════════════════════════════════════ -->
<active-response>
  <command>firewall-drop</command>
  <location>local</location>
  <rules_id>100200</rules_id>
  <timeout>60</timeout>
</active-response>

<!-- High-confidence attacks get a longer block (300s) -->
<active-response>
  <command>firewall-drop</command>
  <location>local</location>
  <rules_id>100201</rules_id>
  <timeout>300</timeout>
</active-response>

<!-- ══════════════════════════════════════════════════════════════════════════
     2. Global whitelist — prevents accidental blocking of SIEM Manager itself
     ══════════════════════════════════════════════════════════════════════════ -->
<global>
  <white_list>192.168.100.10</white_list>   <!-- VM3: SIEM Manager -->
  <white_list>127.0.0.1</white_list>
</global>

<!-- ══════════════════════════════════════════════════════════════════════════
     3. Log monitoring on VM2 (Wazuh Agent) — add to agent's ossec.conf
        This block goes into /var/ossec/etc/ossec.conf on VM2, not VM3.
     ══════════════════════════════════════════════════════════════════════════ -->

<!-- Monitor GANDD-Bridge alert output -->
<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/gandd/alerts.log</location>
</localfile>

<!-- Monitor Suricata EVE JSON -->
<localfile>
  <log_format>json</log_format>
  <location>/var/log/suricata/eve.json</location>
  <only-future-events>yes</only-future-events>
</localfile>

<!-- Monitor system syslog -->
<localfile>
  <log_format>syslog</log_format>
  <location>/var/log/syslog</location>
</localfile>

